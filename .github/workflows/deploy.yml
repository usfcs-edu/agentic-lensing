name: Deploy site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: site/requirements.txt

      - name: Install Python dependencies
        run: pip install -r site/requirements.txt

      # apt's pandoc (2.9 on ubuntu-22.04) lacks --citeproc and the
      # tex_math_gfm extension; pin the release the pipeline was built on.
      - name: Install pandoc
        run: |
          curl -sSL -o /tmp/pandoc.deb \
            https://github.com/jgm/pandoc/releases/download/3.8.3/pandoc-3.8.3-1-amd64.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version

      - name: Convert LaTeX reports to Markdown
        run: python site/build_reports.py

      - name: Build site
        run: mkdocs build -f site/mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
