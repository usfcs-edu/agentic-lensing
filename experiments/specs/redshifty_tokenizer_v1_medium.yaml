name: redshifty_tokenizer_v1_medium
repo: redshifty
description: V1 ConvNeXt+LFQ tokenizer pretrain on local 33-pixel/11.5k-spectrum medium subset
tags: [medium-real, tokenizer, track3]

launch:
  command:
    - python
    - nersc/pretrain_tokenizer.py
    - --manifest
    - /raid/benson/data/desi_dr1_medium/manifest.jsonl
    - --steps
    - "5000"
    - --batch-size
    - "16"
    - --lr
    - "3e-4"
    - --warmup
    - "200"
    - --val-frac
    - "0.05"
    - --val-every
    - "250"
    - --save-every
    - "1000"
    - --log-every
    - "50"
    - --num-workers
    - "4"
    - --amp
    - --run-name
    - tokenizer_v1_medium
    - --scratch-out
    - /raid/benson/data/desi_dr1_medium/checkpoints
    - --wandb-mode
    - disabled
    - --no-push-wandb-artifact

env:
  CUDA_VISIBLE_DEVICES: "8"        # use the L4 (faster than A16 for this workload)
  SCRATCH: /raid/benson/data/desi_dr1_medium
