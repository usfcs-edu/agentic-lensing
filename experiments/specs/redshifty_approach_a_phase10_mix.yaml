name: redshifty_approach_a_phase10_mix
repo: redshifty
description: |
  Approach A with Phase 10 final hparams on the 4-way data mix matching the
  redshifty author's NERSC setup: sv3+main × bright+dark (vs all prior runs
  which used sv3-bright only). 1137 pixels, ~1.82M raw spectra, ~750 GiB on
  disk. Tests whether the ignition gap closes with author's data diversity.
tags: [xlarge-scale, transformer, approach-a, track3, data-mix-test]

launch:
  command:
    - python
    - nersc/train_transformer.py
    - --manifest
    - /raid/benson/data/desi_dr1_medium/manifest_mix.jsonl
    - --tokenizer-ckpt
    - /raid/benson/data/desi_dr1_medium/checkpoints/tokenizer_v1_large/best.pt
    - --tokenizer-kind
    - v1
    - --approach
    - a
    - --steps
    - "10000"
    - --batch-size
    - "32"
    - --lr
    - "4e-4"
    - --warmup
    - "500"
    - --healpix-holdout-frac
    - "0.05"
    - --val-every
    - "500"
    - --save-every
    - "2500"
    - --log-every
    - "100"
    - --num-workers
    - "4"
    - --amp
    - --redshift-loss-weight
    - "50.0"
    - --encoder-mask-ratio
    - "0.50"
    - --ar-eval-batches
    - "8"
    - --run-name
    - approach_a_phase10_mix
    - --scratch-out
    - /raid/benson/data/desi_dr1_medium/checkpoints
    - --wandb-mode
    - disabled
    - --no-push-wandb-artifact

env:
  CUDA_VISIBLE_DEVICES: "8"
  SCRATCH: /raid/benson/data/desi_dr1_medium
