name: redshifty_approach_a_phase10_xlarge
repo: redshifty
description: |
  Approach A transformer matching Phase 10 final NERSC hparams (batch=32, lr=4e-4)
  on the full sv3-bright tree (373 pixels / 729,898 spectra — 1.85× the author's
  394k Phase 10 dataset). Tests whether the residual ignition gap (peak 8.2% in
  phase10 on 219k vs author's 73.8% on 394k) closes with more data.
tags: [xlarge-scale, transformer, approach-a, track3, diagnostic, phase10-match]

launch:
  command:
    - python
    - nersc/train_transformer.py
    - --manifest
    - /raid/benson/data/desi_dr1_medium/manifest.jsonl
    - --tokenizer-ckpt
    - /raid/benson/data/desi_dr1_medium/checkpoints/tokenizer_v1_large/best.pt
    - --tokenizer-kind
    - v1
    - --approach
    - a
    - --steps
    - "10000"
    - --batch-size
    - "32"
    - --lr
    - "4e-4"
    - --warmup
    - "500"
    - --healpix-holdout-frac
    - "0.05"
    - --val-every
    - "500"
    - --save-every
    - "2500"
    - --log-every
    - "100"
    - --num-workers
    - "4"
    - --amp
    - --redshift-loss-weight
    - "50.0"
    - --encoder-mask-ratio
    - "0.50"
    - --ar-eval-batches
    - "8"      # bumped from 4 — n_samples should reach ~188, finally meaningful
    - --run-name
    - approach_a_phase10_xlarge
    - --scratch-out
    - /raid/benson/data/desi_dr1_medium/checkpoints
    - --wandb-mode
    - disabled
    - --no-push-wandb-artifact

env:
  CUDA_VISIBLE_DEVICES: "8"
  SCRATCH: /raid/benson/data/desi_dr1_medium
