name: codecs_smoke
repo: codecs
description: 20-step codecs Mamba3+RFSQ training on the 247-spectrum mini-HDF5 cache
tags: [smoke, track2-mvp]

launch:
  command:
    - torchrun
    - --nproc_per_node=1
    - --master_port=29501
    - scripts/train.py
    - --config
    - /raid/benson/data/desi_dr1_mini/codecs_smoke.yaml

env:
  CUDA_VISIBLE_DEVICES: "0"
  TORCHDYNAMO_DISABLE: "1"
