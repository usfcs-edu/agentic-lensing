name: redshifty_approach_a_medium
repo: redshifty
description: Approach A transformer on local medium subset with V1 tokenizer (depends on redshifty_tokenizer_v1_medium completing)
tags: [medium-real, transformer, approach-a, track3]

launch:
  command:
    - python
    - nersc/train_transformer.py
    - --manifest
    - /raid/benson/data/desi_dr1_medium/manifest.jsonl
    - --tokenizer-ckpt
    - /raid/benson/data/desi_dr1_medium/checkpoints/tokenizer_v1_medium/best.pt
    - --tokenizer-kind
    - v1
    - --approach
    - a
    - --steps
    - "2000"
    - --batch-size
    - "8"
    - --lr
    - "2e-4"
    - --warmup
    - "200"
    - --healpix-holdout-frac
    - "0.10"
    - --val-every
    - "200"
    - --save-every
    - "500"
    - --log-every
    - "25"
    - --num-workers
    - "4"
    - --amp
    - --redshift-loss-weight
    - "50.0"
    - --encoder-mask-ratio
    - "0.50"
    - --ar-eval-batches
    - "2"
    - --run-name
    - approach_a_medium
    - --scratch-out
    - /raid/benson/data/desi_dr1_medium/checkpoints
    - --wandb-mode
    - disabled
    - --no-push-wandb-artifact

env:
  CUDA_VISIBLE_DEVICES: "8"
  SCRATCH: /raid/benson/data/desi_dr1_medium
