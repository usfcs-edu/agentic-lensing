name: redshifty_tokenizer_v1_large
repo: redshifty
description: V1 ConvNeXt+LFQ tokenizer pretrain on ~150-300k local spectra (large pull, raised size cap)
tags: [large-scale, tokenizer, track3]

launch:
  command:
    - python
    - nersc/pretrain_tokenizer.py
    - --manifest
    - /raid/benson/data/desi_dr1_medium/manifest.jsonl
    - --steps
    - "15000"
    - --batch-size
    - "16"
    - --lr
    - "3e-4"
    - --warmup
    - "500"
    - --val-frac
    - "0.05"
    - --val-every
    - "500"
    - --save-every
    - "2500"
    - --log-every
    - "100"
    - --num-workers
    - "4"
    - --amp
    - --run-name
    - tokenizer_v1_large
    - --scratch-out
    - /raid/benson/data/desi_dr1_medium/checkpoints
    - --wandb-mode
    - disabled
    - --no-push-wandb-artifact

env:
  CUDA_VISIBLE_DEVICES: "8"
  SCRATCH: /raid/benson/data/desi_dr1_medium
