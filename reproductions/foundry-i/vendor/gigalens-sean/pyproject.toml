[project]
name = "gigalens"
version = "1.2.1"
description = "This is a package for Gradient Informed, GPU Accelerated Lens modelling (GIGALens)."
readme = "README.rst"
requires-python = ">=3.12"
dependencies = [
    "tensorflow-probability (==0.25.0)",
    "tensorflow (==2.19.0)",
    "jax (==0.6.2)",
    "optax (>=0.2.6,<0.3.0)",
    "tqdm (>=4.67.1,<5.0.0)",
    "objax (>=1.8.0,<2.0.0)",
    "lenstronomy (>=1.13.2,<2.0.0)",
    "numpy (==2.1.3)"
]

[project.optional-dependencies]
cuda = [
    "jax[cuda12] (==0.6.2)",
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
