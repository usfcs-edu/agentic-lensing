site_name: Agentic Lensing
site_description: >-
  Agentic reproductions of the Huang-group strong-lensing corpus,
  plus current work: LensJudge, ClaudeNet, and Redshifty.
site_author: Greg Benson
site_url: https://usfcs-edu.github.io/agentic-lensing/

repo_url: https://github.com/usfcs-edu/agentic-lensing
repo_name: usfcs-edu/agentic-lensing

# "site" is this project's directory name, so the build output gets an
# explicit, distinct name (resolved relative to this file -> site/_site/).
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/logo.png

  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # NOTE: navigation.indexes is deliberately OFF — every report page is a
    # <slug>/index.md, and the feature would adopt the first one as each
    # section's landing page (clicking "Current" would open LensJudge and
    # remove it from the child list). Sections should only expand/collapse.
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    # NOTE: deliberately no toc.integrate — keeps the right-side page TOC.

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Pages under current/, reproductions/, and other/apple-silicon/<slug>.md are
# GENERATED by site/build_reports.py (run it before `mkdocs build --strict`
# or `mkdocs serve`); they are gitignored and built in CI.
nav:
  - Home: index.md
  - Current:
      - LensJudge: current/lensjudge/index.md
      - ClaudeNet: current/claudenet/index.md
      - Redshifty: current/redshifty/index.md
  - Reproductions:
      - AION-1: reproductions/aion-1/index.md
      - Cikota 2023: reproductions/cikota-2023/index.md
      - Dawes 2022: reproductions/dawes-2022/index.md
      - Foundry I: reproductions/foundry-i/index.md
      - Foundry I Evolution: reproductions/foundry-i-evolution/index.md
      - Foundry II: reproductions/foundry-ii/index.md
      - Foundry III: reproductions/foundry-iii/index.md
      - Foundry IV: reproductions/foundry-iv/index.md
      - Gu 2022: reproductions/gu-2022/index.md
      - Hsu 2025: reproductions/hsu-2025/index.md
      - Huang 2020: reproductions/huang-2020/index.md
      - Huang 2021: reproductions/huang-2021/index.md
      - Inchausti 2025: reproductions/inchausti-2025/index.md
      - Sheu 2023: reproductions/sheu-2023/index.md
      - Sheu 2024a: reproductions/sheu-2024a/index.md
      - Sheu 2024b: reproductions/sheu-2024b/index.md
      - Silver 2025: reproductions/silver-2025/index.md
  - Other:
      - Apple Silicon:
          - Overview: other/apple-silicon/index.md
          - Huang 2020 port: other/apple-silicon/huang-2020.md
          - Huang 2021 port: other/apple-silicon/huang-2021.md
          - Redshifty port: other/apple-silicon/redshifty.md
      - DESI DR11 Cutouts: other/desi-dr11-cutouts/index.md
